<section class="hero">

  <!-- Banner Image -->
  <img src="banner.png" alt="RAVIYA ACCOUNT STORE">

  <!-- Text Content -->
  <div class="hero-content">

    <h1>RAVIYA ACCOUNT STORE</h1>

    <p>BUY • SELL • EXCHANGE</p>

    <!-- WhatsApp Button -->
    <a href="https://wa.me/94763162805" class="btn">
      💬 WhatsApp
    </a>

    <!-- Install App Button -->
    <button id="installBtn">
      📲 Install App
    </button>

  </div>

</section>

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {

  e.preventDefault();

  deferredPrompt = e;

  const installBtn =
  document.getElementById('installBtn');

  installBtn.style.display = 'inline-block';

  installBtn.addEventListener('click', async () => {

    deferredPrompt.prompt();

    deferredPrompt = null;

  });

});.hero{
  position:relative;
  width:100%;
  overflow:hidden;
  border-radius:20px;
  margin-top:20px;
}

.hero img{
  width:100%;
  display:block;
  border-radius:20px;
}

.hero-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:100%;
  color:white;
}

.hero-content h1{
  font-size:42px;
  font-weight:bold;
  text-shadow:0 0 15px #000;
}

.hero-content p{
  margin-top:10px;
  font-size:18px;
  letter-spacing:3px;
  text-shadow:0 0 10px #000;
}

.btn{
  display:inline-block;
  margin-top:20px;

  background:#00bfff;

  text-decoration:none;
  border-radius:12px;
  font-weight:bold;
  box-shadow:0 0 15px #00bfff;
}

#installBtn{
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:12px;
  background:#00ff99;
  color:black;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  display:none;
}
</script>
